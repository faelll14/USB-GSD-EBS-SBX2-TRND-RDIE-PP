<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>SMAN 14 Depok</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
}
#c{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:block;
  image-rendering:auto;
}
#hint{
  position:fixed;
  bottom:max(20px, env(safe-area-inset-bottom, 20px));
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.25);
  font:11px/1 'Courier New',monospace;
  letter-spacing:.18em;
  text-transform:uppercase;
  pointer-events:none;
  user-select:none;
  transition:opacity 1s;
  white-space:nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">tap for sound</div>
<script>
const cv = document.getElementById('c');
const gx = cv.getContext('2d');
const hint = document.getElementById('hint');

let W, H, CX, CY, R, LR, DPR;

/* ─── Canvas resize: scale for device pixel ratio ─── */
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3); // cap at 3x for perf
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width  = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  gx.setTransform(DPR, 0, 0, DPR, 0, 0);
  CX = W / 2;
  CY = H / 2;
  R  = Math.min(W, H) * 0.022;
  LR = Math.min(W, H) * 0.22;
}
resize();
window.addEventListener('resize', () => { resize(); init(); });

/* ─── Logo (file lokal) ─── */
const logoImg = new Image();
logoImg.src = 'logo.png';
let logoLoaded = false;
logoImg.onload  = () => { logoLoaded = true; };
logoImg.onerror = () => { logoLoaded = false; }; // graceful fallback

/* ─── Audio ─── */
let ac = null;
function tryAC() {
  if (!ac) try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  return ac;
}
document.addEventListener('click',    () => { tryAC(); hint.style.opacity = 0; }, { once: true });
document.addEventListener('touchend', () => { tryAC(); hint.style.opacity = 0; }, { once: true });
setTimeout(tryAC, 80);

function sfxBounce(f, v) {
  const a = tryAC(); if (!a) return; const t = a.currentTime;
  const o1 = a.createOscillator(), g1 = a.createGain();
  o1.connect(g1); g1.connect(a.destination);
  o1.type = 'sine'; o1.frequency.setValueAtTime(f, t);
  o1.frequency.exponentialRampToValueAtTime(f * .18, t + .42);
  g1.gain.setValueAtTime(v, t); g1.gain.exponentialRampToValueAtTime(1e-4, t + .46);
  o1.start(t); o1.stop(t + .47);
  const o2 = a.createOscillator(), g2 = a.createGain();
  o2.connect(g2); g2.connect(a.destination);
  o2.type = 'sawtooth'; o2.frequency.setValueAtTime(900, t);
  o2.frequency.exponentialRampToValueAtTime(150, t + .05);
  g2.gain.setValueAtTime(v * .38, t); g2.gain.exponentialRampToValueAtTime(1e-4, t + .06);
  o2.start(t); o2.stop(t + .07);
}

function sfxReveal() {
  const a = tryAC(); if (!a) return; const t = a.currentTime;
  const buf = a.createBuffer(1, a.sampleRate * .6, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = a.createBufferSource(); src.buffer = buf;
  const bp = a.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = .35;
  bp.frequency.setValueAtTime(280, t); bp.frequency.exponentialRampToValueAtTime(9000, t + .42);
  const gn = a.createGain();
  gn.gain.setValueAtTime(0, t); gn.gain.linearRampToValueAtTime(.58, t + .04);
  gn.gain.exponentialRampToValueAtTime(1e-4, t + .52);
  src.connect(bp); bp.connect(gn); gn.connect(a.destination);
  src.start(t); src.stop(t + .6);
  [523.25, 659.25, 783.99, 1046.5, 1318.51].forEach((freq, i) => {
    const dl = .06 + i * .11;
    const o = a.createOscillator(), g = a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type = 'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t + dl); g.gain.linearRampToValueAtTime(.28, t + dl + .07);
    g.gain.setValueAtTime(.28, t + dl + .2); g.gain.exponentialRampToValueAtTime(1e-4, t + dl + 1.6);
    o.start(t + dl); o.stop(t + dl + 1.7);
  });
}

/* ─── Physics constants ─── */
const G = 1900, SQ_DUR = .21, SQX = 1.88, SQY = .27;

/* ─── State ─── */
let phase, sqT, pVY, bx, by, bvy;
let trail, ripples, parts;
let morphP, revealP, bgAlpha;
let bgColorP, fadeOutAlpha, holdTimer;
let lastTs;

function init() {
  bx = CX; by = R; bvy = 0;
  phase = 'FALL_1'; sqT = 0; pVY = 0;
  trail = []; ripples = []; parts = [];
  morphP = 0; revealP = 0; bgAlpha = 0;
  bgColorP = 0; fadeOutAlpha = 0; holdTimer = 0;
  lastTs = null;
}

/* ─── Easing ─── */
function sqCurve(t) {
  if (t <= 0 || t >= 1) return 0;
  const p = .17; if (t < p) return t / p;
  const s = (t - p) / (1 - p);
  return (1 - s) * (1 + .24 * Math.sin(s * Math.PI * 3.4) * Math.exp(-s * 3.2));
}
function ease3(t) { return t * t * (3 - 2 * t); }

/* ─── Particles / Ripples ─── */
function addRip(x, y, n) {
  for (let i = 0; i < n; i++)
    ripples.push({ x, y, r: i * 24, a: .78 - i * .2, spd: 190 + i * 58 });
}
function addParts(x, y, n) {
  for (let i = 0; i < n; i++) {
    const ang = -Math.PI / 2 + (Math.random() - .5) * Math.PI;
    const spd = 90 + Math.random() * 430;
    parts.push({ x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
                 life: 1, dec: 1.5 + Math.random() * 2, r: R * (.06 + Math.random() * .14) });
  }
}

/* ─── Update ─── */
function update(dt) {
  ripples.forEach(r => { r.r += r.spd * dt; r.a -= 2.9 * dt; });
  ripples = ripples.filter(r => r.a > 0);
  parts.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += G * .38 * dt; p.life -= p.dec * dt; });
  parts = parts.filter(p => p.life > 0);

  switch (phase) {
    case 'FALL_1':
      bvy += G * dt; by += bvy * dt;
      if (by >= H - R) {
        by = H - R; pVY = -Math.sqrt(2 * G * .95 * (H - 2 * R));
        phase = 'SQUASH_1'; sqT = 0;
        addRip(CX, H, 3); addParts(CX, H - R * .6, 15); sfxBounce(108, .8);
      }
      break;
    case 'SQUASH_1':
      sqT += dt / SQ_DUR; if (sqT >= 1) { sqT = 0; by = H - R; bvy = pVY; phase = 'RISE_1'; }
      break;
    case 'RISE_1':
      bvy += G * dt; by += bvy * dt; if (bvy >= 0) phase = 'FALL_2';
      break;
    case 'FALL_2':
      bvy += G * dt; by += bvy * dt;
      if (by >= H - R) {
        by = H - R; pVY = -Math.sqrt(2 * G * .70 * (H - 2 * R));
        phase = 'SQUASH_2'; sqT = 0;
        addRip(CX, H, 2); addParts(CX, H - R * .6, 11); sfxBounce(88, .7);
      }
      break;
    case 'SQUASH_2':
      sqT += dt / SQ_DUR; if (sqT >= 1) { sqT = 0; by = H - R; bvy = pVY; phase = 'RISE_2'; }
      break;
    case 'RISE_2':
      bvy += G * dt; by += bvy * dt; if (bvy >= 0) phase = 'FALL_3';
      break;
    case 'FALL_3':
      bvy += G * dt; by += bvy * dt;
      if (by >= H - R) {
        by = H - R; pVY = -Math.sqrt(2 * G * (CY - R));
        phase = 'SQUASH_3'; sqT = 0;
        addRip(CX, H, 2); addParts(CX, H - R * .6, 9); sfxBounce(72, .62);
      }
      break;
    case 'SQUASH_3':
      sqT += dt / SQ_DUR; if (sqT >= 1) { sqT = 0; by = H - R; bvy = pVY; phase = 'RISE_3'; }
      break;
    case 'RISE_3': {
      bvy += G * dt; by += bvy * dt;
      const ms = CY + (H - R - CY) * .52;
      morphP = Math.max(0, Math.min(1, (ms - by) / (ms - CY)));
      if (bvy >= 0 || by <= CY) { by = CY; bvy = 0; morphP = 1; phase = 'REVEAL'; sfxReveal(); }
      break;
    }
    /* Logo reveals (white wash fades in) */
    case 'REVEAL':
      revealP = Math.min(1, revealP + dt / 1.7);
      bgAlpha  = Math.min(1, bgAlpha  + dt * 2.8);
      if (revealP >= 1 && bgAlpha >= 1) {
        phase = 'HOLD'; holdTimer = 0; bgColorP = 0;
      }
      break;
    /* Brief hold → background transitions to colour */
    case 'HOLD':
      holdTimer += dt;
      bgColorP = Math.min(1, holdTimer / 1.0); // 1 s to shift colour
      if (holdTimer >= 2.2) {
        phase = 'FADE_OUT'; fadeOutAlpha = 0;
      }
      break;
    /* Fade entire screen to black */
    case 'FADE_OUT':
      fadeOutAlpha = Math.min(1, fadeOutAlpha + dt * 0.55);
      break;
  }

  const fly = ['FALL_1','RISE_1','FALL_2','RISE_2','FALL_3','RISE_3'].includes(phase);
  if (fly) { trail.push({ x: bx, y: by, a: .6 }); if (trail.length > 11) trail.shift(); }
  else trail = trail.map(p => ({ ...p, a: p.a - dt * 9 })).filter(p => p.a > 0);
}

/* ─── Colour helpers ─── */
// Lerp between two rgb values
function lerpRGB(r1,g1,b1, r2,g2,b2, t) {
  const e = ease3(Math.max(0, Math.min(1, t)));
  return [Math.round(r1+(r2-r1)*e), Math.round(g1+(g2-g1)*e), Math.round(b1+(b2-b1)*e)];
}
// School brand colour: deep navy #0d2249
const BRAND = [13, 34, 73];

/* ─── Draw ─── */
function draw() {
  gx.clearRect(0, 0, W, H);

  /* Background colour */
  let bgR, bgG, bgB;
  if (phase === 'HOLD' || phase === 'FADE_OUT') {
    // White → navy
    [bgR, bgG, bgB] = lerpRGB(255,255,255, BRAND[0],BRAND[1],BRAND[2], bgColorP);
  } else {
    // Black → white
    const v = Math.round(bgAlpha * 255);
    [bgR, bgG, bgB] = [v, v, v];
  }
  gx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
  gx.fillRect(0, 0, W, H);

  /* Vignette (only during ball phase) */
  if (bgAlpha < .98) {
    const vg = gx.createRadialGradient(CX, CY, H * .18, CX, CY, H * .9);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, `rgba(0,0,0,${.65 * (1 - bgAlpha)})`);
    gx.fillStyle = vg; gx.fillRect(0, 0, W, H);
  }

  /* Ripples */
  ripples.forEach(r => {
    gx.beginPath(); gx.ellipse(r.x, r.y, r.r, r.r * .12, 0, 0, Math.PI * 2);
    gx.strokeStyle = `rgba(255,255,255,${r.a})`; gx.lineWidth = 1.5; gx.stroke();
  });

  /* Particles */
  parts.forEach(p => {
    gx.beginPath(); gx.arc(p.x, p.y, Math.max(0, p.r * p.life), 0, Math.PI * 2);
    gx.fillStyle = `rgba(255,255,255,${p.life * .82})`; gx.fill();
  });

  /* Trail */
  trail.forEach((p, i) => {
    const f = (i + 1) / trail.length;
    gx.beginPath(); gx.arc(p.x, p.y, R * f * .46, 0, Math.PI * 2);
    gx.fillStyle = `rgba(255,255,255,${p.a * .1 * f})`; gx.fill();
  });

  /* Ball */
  const isQ = ['SQUASH_1','SQUASH_2','SQUASH_3'].includes(phase);
  const sf = sqCurve(sqT);
  let sx = 1, sy = 1;
  if (isQ) {
    sx = 1 + (SQX - 1) * sf; sy = 1 - (1 - SQY) * sf;
  } else {
    const fly2 = ['FALL_1','FALL_2','FALL_3'].includes(phase);
    const rise  = ['RISE_1','RISE_2'].includes(phase);
    if ((fly2 || rise) && Math.abs(bvy) > 80) {
      const spd = Math.abs(bvy), mx = Math.sqrt(2 * G * H * .96) * 1.05;
      const str = Math.min(.32, spd / mx * .42);
      sy = 1 + str; sx = Math.max(.72, 1 - str * .55);
    }
  }

  const eM = ease3(morphP);
  const curR = R + (LR - R) * eM;
  const drawY = isQ ? H - R * sy : by;

  if (phase !== 'REVEAL' && phase !== 'HOLD' && phase !== 'FADE_OUT') {
    gx.save(); gx.translate(bx, drawY); gx.scale(sx, sy);
    const gl = gx.createRadialGradient(0, 0, 0, 0, 0, curR * 2.4);
    gl.addColorStop(0, 'rgba(255,255,255,.13)'); gl.addColorStop(1, 'rgba(255,255,255,0)');
    gx.beginPath(); gx.arc(0, 0, curR * 2.4, 0, Math.PI * 2); gx.fillStyle = gl; gx.fill();
    const bg2 = gx.createRadialGradient(-curR * .27, -curR * .28, curR * .04, 0, 0, curR);
    bg2.addColorStop(0, '#ffffff'); bg2.addColorStop(.6, '#f0f0f0'); bg2.addColorStop(1, '#c2c2c2');
    gx.beginPath(); gx.arc(0, 0, curR, 0, Math.PI * 2); gx.fillStyle = bg2; gx.fill();
    gx.restore();
  }

  /* ─── Logo (reveal + hold + fade_out) ─── */
  if (phase === 'REVEAL' || phase === 'HOLD' || phase === 'FADE_OUT') {
    const lx = Math.round(CX - LR);
    const ly = Math.round(CY - LR);
    const ls = Math.round(LR * 2);

    /* 1. Gambar logo langsung — PNG transparan tampil di atas bg, TANPA lingkaran putih */
    if (logoLoaded) {
      gx.drawImage(logoImg, lx, ly, ls, ls);
    }

    /* 2. Tirai putih menyapu ke atas (di-clip ke lingkaran agar rapi) */
    if (phase === 'REVEAL') {
      gx.save();
      gx.beginPath(); gx.ellipse(CX, CY, LR, LR, 0, 0, Math.PI * 2); gx.clip();
      const rl = (CY + LR) - revealP * (LR * 2);
      gx.fillStyle = '#fff';
      gx.fillRect(lx - 1, ly - 1, ls + 2, rl - ly + 1);
      if (revealP > 0 && revealP < 1) {
        const shimH = LR * .42;
        const sg = gx.createLinearGradient(0, rl - shimH * .75, 0, rl + shimH * .45);
        sg.addColorStop(0,   'rgba(255,255,255,0)');
        sg.addColorStop(.32, 'rgba(255,255,255,.88)');
        sg.addColorStop(.5,  'rgba(255,255,255,1)');
        sg.addColorStop(.66, 'rgba(255,255,255,.9)');
        sg.addColorStop(1,   'rgba(255,255,255,0)');
        gx.fillStyle = sg;
        gx.fillRect(lx, rl - shimH, ls, shimH * 1.45);
      }
      gx.restore();
    }

    /* 3. Ring glow tipis saat HOLD / FADE_OUT */
    if (phase === 'HOLD' || phase === 'FADE_OUT') {
      const ringAlpha = ease3(bgColorP) * 0.45;
      gx.beginPath(); gx.ellipse(CX, CY, LR + 3, LR + 3, 0, 0, Math.PI * 2);
      gx.strokeStyle = `rgba(255,255,255,${ringAlpha})`;
      gx.lineWidth = 4; gx.stroke();
    }
  }

  /* ─── FADE TO BLACK overlay ─── */
  if (phase === 'FADE_OUT' && fadeOutAlpha > 0) {
    gx.fillStyle = `rgba(0,0,0,${fadeOutAlpha})`;
    gx.fillRect(0, 0, W, H);
  }
}

/* ─── Loop ─── */
function frame(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, .033);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
init();
requestAnimationFrame(frame);
</script>
</body>
</html>
